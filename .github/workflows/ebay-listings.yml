name: eBay Listings Sync

on:
  schedule:
    - cron: '0 7,13,19 * * *'  # täglich um 07:00, 13:00, 19:00 UTC
  workflow_dispatch:             # manuell ausführbar über GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run eBay listings sync
        env:
          EBAY_CLIENT_ID:       ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET:   ${{ secrets.EBAY_CLIENT_SECRET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ebay_listings.py
